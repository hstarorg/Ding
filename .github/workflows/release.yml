name: Release

# Publish a .dmg installer when a version tag is pushed, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# Also runnable manually from the Actions tab.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # required to create the GitHub Release and upload assets

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Build (Release, ad-hoc signed)
        run: |
          set -euo pipefail
          xcodebuild -version   # log the runner's default Xcode (16.x on macos-15)
          xcodebuild \
            -project Ding.xcodeproj \
            -scheme Ding \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Package Ding.dmg
        run: |
          set -euo pipefail
          APP="build/Build/Products/Release/Ding.app"
          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/Ding.app"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Ding" -srcfolder "$STAGE" -ov -format UDZO Ding.dmg

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Use the runner's built-in gh CLI (no Node-based action).
          gh release create "$TAG" Ding.dmg --title "$TAG" --generate-notes \
            || gh release upload "$TAG" Ding.dmg --clobber
